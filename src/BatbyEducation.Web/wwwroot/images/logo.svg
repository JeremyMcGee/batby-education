  <line x1="26" y1="27" x2="44" y2="25" stroke="#2c5282" stroke-width="0.8" opacity="0.5"/>
  <line x1="26" y1="32" x2="44" y2="30" stroke="#2c5282" stroke-width="0.8" opacity="0.5"/>
  <line x1="56" y1="20" x2="74" y2="22" stroke="#2c5282" stroke-width="0.8" opacity="0.4"/>
  <line x1="56" y1="25" x2="74" y2="27" stroke="#2c5282" stroke-width="0.8" opacity="0.4"/>
  <line x1="56" y1="30" x2="74" y2="32" stroke="#2c5282" stroke-width="0.8" opacity="0.4"/>
